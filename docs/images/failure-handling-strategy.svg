<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Failure handling strategy</title>
  <desc id="desc">Failure classification and decision strategy for expired blockhashes, low fees, simulation failures, rate limits, and timeouts.</desc>
  <defs>
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif}.bg{fill:#f6f8fb}.h1{font-size:30px;font-weight:750;fill:#111827}.sub{font-size:15px;fill:#5b6575}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:14}.red{stroke:#dc2626}.gold{stroke:#d97706}.blue{stroke:#2563eb}.green{stroke:#059669}
      .label{font-size:16.5px;font-weight:750;fill:#111827}.body{font-size:13px;fill:#475569}.small{font-size:12px;fill:#64748b}.k{font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;fill:#64748b}
      .arrow{fill:none;stroke:#334155;stroke-width:2.2;marker-end:url(#arrow)}.fail{stroke:#dc2626}.ok{stroke:#059669}.warn{stroke:#d97706}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0 10 4 0 8z" fill="#334155"/></marker>
  </defs>

  <rect class="bg" width="1200" height="675"/>
  <text class="h1" x="48" y="58">Failure Handling Strategy</text>
  <text class="sub" x="48" y="84">Classify first. Then choose only the action allowed by the signing boundary and local policy.</text>

  <text class="k" x="80" y="270">Input</text>
  <rect class="box red" x="80" y="300" width="210" height="100"/>
  <text class="label" x="108" y="338">Raw failure detail</text><text class="body" x="108" y="365">Jito, Solana RPC,</text><text class="body" x="108" y="385">Geyser, or timeout</text>

  <text class="k" x="385" y="270">Classifier</text>
  <rect class="box gold" x="370" y="300" width="220" height="100"/>
  <text class="label" x="398" y="338">Failure taxonomy</text><text class="body" x="398" y="365">Turn raw error strings</text><text class="body" x="398" y="385">into stable categories</text>

  <text class="k" x="710" y="105">Decision</text>
  <rect class="box blue" x="680" y="135" width="210" height="78"/>
  <text class="label" x="706" y="167">Expired blockhash</text><text class="body" x="706" y="191">Escalate for new tx</text>
  <rect class="box blue" x="680" y="245" width="210" height="78"/>
  <text class="label" x="706" y="277">Tip too low</text><text class="body" x="706" y="301">Escalate for new tip</text>
  <rect class="box blue" x="680" y="355" width="210" height="78"/>
  <text class="label" x="706" y="387">Simulation failure</text><text class="body" x="706" y="411">Abandon bad shape</text>
  <rect class="box blue" x="680" y="465" width="210" height="78"/>
  <text class="label" x="706" y="497">Rate limit / timeout</text><text class="body" x="706" y="521">Wait or retry</text>

  <text class="k" x="1000" y="270">Output</text>
  <rect class="box green" x="980" y="300" width="150" height="100"/>
  <text class="label" x="1006" y="338">Policy-safe</text><text class="body" x="1006" y="365">Logged decision</text><text class="body" x="1006" y="385">and evidence</text>

  <path class="arrow fail" d="M290 350h75"/><path class="arrow warn" d="M590 350c42-98 55-154 86-176"/><path class="arrow warn" d="M590 350c45-48 58-60 86-66"/><path class="arrow warn" d="M590 350c45 30 58 38 86 44"/><path class="arrow warn" d="M590 350c52 95 58 146 86 154"/>
  <path class="arrow ok" d="M890 174c54 48 68 88 86 176"/><path class="arrow ok" d="M890 284c48 18 62 34 86 66"/><path class="arrow ok" d="M890 394c48-18 62-34 86-44"/><path class="arrow ok" d="M890 504c54-48 68-88 86-154"/>

  <rect class="box" x="110" y="565" width="980" height="62"/>
  <text class="label" x="140" y="592">Hackathon run evidence</text>
  <text class="body" x="140" y="616">Two planned unfunded failures were InsufficientFunds; one landed bundle later returned a Jito regional AlreadyProcessed signal.</text>
</svg>
