<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">tx_agent system overview</title>
  <desc id="desc">High-level architecture for tx_agent, showing signer, agent host, MCP server, transaction stack, live Solana and Jito infrastructure, and report output.</desc>
  <defs>
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif}
      .bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8dee9;stroke-width:1.5;rx:18}
      .h1{font-size:30px;font-weight:750;fill:#111827}.sub{font-size:15px;fill:#5b6575}
      .kicker{font-size:12px;font-weight:750;letter-spacing:.12em;text-transform:uppercase;fill:#64748b}
      .node{fill:#fff;stroke:#cbd5e1;stroke-width:1.4;rx:14}.blue{stroke:#2563eb}.green{stroke:#059669}.gold{stroke:#d97706}.red{stroke:#dc2626}
      .stripe-blue{fill:#2563eb}.stripe-green{fill:#059669}.stripe-gold{fill:#d97706}.stripe-red{fill:#dc2626}
      .label{font-size:18px;font-weight:750;fill:#111827}.body{font-size:13.5px;fill:#475569}.tiny{font-size:12.5px;fill:#64748b}
      .arrow{fill:none;stroke:#334155;stroke-width:2.2;marker-end:url(#arrow)}
      .soft{fill:none;stroke:#94a3b8;stroke-width:1.5;stroke-dasharray:6 6}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 10 4 0 8z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="675"/>
  <text class="h1" x="48" y="58">tx_agent System Overview</text>
  <text class="sub" x="48" y="84">A bounded Solana transaction control plane: signed payloads in, Jito bundle lifecycle evidence out.</text>

  <rect class="panel" x="40" y="125" width="335" height="430"/>
  <text class="kicker" x="70" y="164">Decision side</text>
  <rect class="node blue" x="70" y="195" width="255" height="92"/>
  <rect class="stripe-blue" x="70" y="195" width="8" height="92" rx="4"/>
  <text class="label" x="96" y="230">Upstream signer</text>
  <text class="body" x="96" y="255">Builds and signs the Solana</text>
  <text class="body" x="96" y="276">transaction before tx_agent sees it.</text>
  <rect class="node blue" x="70" y="365" width="255" height="104"/>
  <rect class="stripe-blue" x="70" y="365" width="8" height="104" rx="4"/>
  <text class="label" x="96" y="400">agent_host</text>
  <text class="body" x="96" y="425">Reads live state, chooses submit,</text>
  <text class="body" x="96" y="446">wait, retry, abandon, or escalate.</text>

  <rect class="panel" x="432" y="125" width="335" height="430"/>
  <text class="kicker" x="462" y="164">Controlled write surface</text>
  <rect class="node green" x="462" y="195" width="255" height="104"/>
  <rect class="stripe-green" x="462" y="195" width="8" height="104" rx="4"/>
  <text class="label" x="488" y="230">agent_mcp</text>
  <text class="body" x="488" y="255">MCP server. Owns network access</text>
  <text class="body" x="488" y="276">and exposes controlled tools.</text>
  <rect class="node green" x="462" y="365" width="255" height="104"/>
  <rect class="stripe-green" x="462" y="365" width="8" height="104" rx="4"/>
  <text class="label" x="488" y="400">TxStack</text>
  <text class="body" x="488" y="425">Verifies payloads, submits bundles,</text>
  <text class="body" x="488" y="446">tracks lifecycle and failures.</text>

  <rect class="panel" x="824" y="125" width="335" height="430"/>
  <text class="kicker" x="854" y="164">Network and evidence</text>
  <rect class="node gold" x="854" y="195" width="255" height="70"/>
  <rect class="stripe-gold" x="854" y="195" width="8" height="70" rx="4"/>
  <text class="label" x="880" y="227">Jito Block Engine</text>
  <text class="body" x="880" y="250">Leaders, tips, bundles, results</text>
  <rect class="node gold" x="854" y="295" width="255" height="70"/>
  <rect class="stripe-gold" x="854" y="295" width="8" height="70" rx="4"/>
  <text class="label" x="880" y="327">Yellowstone / Geyser</text>
  <text class="body" x="880" y="350">Slots, blockhashes, signatures</text>
  <rect class="node gold" x="854" y="395" width="255" height="70"/>
  <rect class="stripe-gold" x="854" y="395" width="8" height="70" rx="4"/>
  <text class="label" x="880" y="427">Solana RPC</text>
  <text class="body" x="880" y="450">Commitment fallback checks</text>
  <rect class="node red" x="854" y="495" width="255" height="70"/>
  <rect class="stripe-red" x="854" y="495" width="8" height="70" rx="4"/>
  <text class="label" x="880" y="527">Report evidence</text>
  <text class="body" x="880" y="550">JSONL + hackathon_report.json</text>

  <path class="arrow" d="M198 287v73"/>
  <text class="tiny" x="216" y="326">signed tx only</text>
  <path class="arrow" d="M325 418h132"/>
  <text class="tiny" x="355" y="402">MCP over HTTP</text>
  <path class="arrow" d="M590 299v61"/>
  <text class="tiny" x="608" y="334">tool call</text>
  <path class="arrow" d="M717 405c55-90 86-154 132-175"/>
  <path class="arrow" d="M717 420c50-58 82-84 132-90"/>
  <path class="arrow" d="M717 435c50-5 82-5 132-5"/>
  <path class="arrow" d="M717 455c66 48 83 70 132 75"/>
  <path class="soft" d="M40 596h1119"/>
  <text class="label" x="70" y="624">Boundary: tx_agent routes and explains signed transactions.</text>
  <text class="label" x="70" y="650">It never signs, rewrites, refreshes blockhashes, or changes embedded tips.</text>
</svg>
